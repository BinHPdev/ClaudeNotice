# ClaudeNotice 配置文件
# 修改此文件来控制数据源、抓取行为和网站展示

# ────────────────────────────────────────
# X (Twitter) 监控账号
# ────────────────────────────────────────
twitter:
  accounts:
    # Anthropic 官方
    - AnthropicAI
    - alexalbert__
    - AmandaAskell
    - DarioAmodei
    # 高影响力开发者/研究者
    - karpathy
    - simonw
    - swyx
    - leeerob
    - gergelyorosz
    - GregBrockman
    - sama
    - ylecun
    - srush_nlp
  keywords:
    - "claude code"
    - "claude-code"
    - "claudecode"
    - "anthropic claude"
  max_tweets_per_account: 20
  # 使用 nitter 镜像列表（按优先级，备用方案）
  nitter_instances:
    - https://nitter.poast.org
    - https://nitter.privacydev.net
    - https://nitter.1d4.us

# ────────────────────────────────────────
# GitHub 数据源
# ────────────────────────────────────────
github:
  topics:
    - claude-code
    - claude-cli
    - anthropic
    - claude-ai
  search_queries:
    - "claude code workflow"
    - "CLAUDE.md best practices"
    - "anthropic claude productivity"
  trending: true
  min_stars: 10

# ────────────────────────────────────────
# Reddit 监控
# ────────────────────────────────────────
reddit:
  subreddits:
    - ClaudeAI
    - Anthropic
    - LocalLLaMA
    - MachineLearning
    - programming
    - artificial
  keywords:
    - "claude code"
    - "claude-code"
    - "anthropic"
  min_score: 20
  post_limit: 50
  # Reddit API 凭据（需要在 https://www.reddit.com/prefs/apps 创建应用）
  client_id: "${REDDIT_CLIENT_ID}"
  client_secret: "${REDDIT_CLIENT_SECRET}"
  user_agent: "ClaudeNotice/1.0"

# ────────────────────────────────────────
# Hacker News
# ────────────────────────────────────────
hackernews:
  keywords:
    - "claude"
    - "claude code"
    - "anthropic"
    - "claude-code"
  min_points: 30
  stories_limit: 100

# ────────────────────────────────────────
# RSS 源 — 英文
# ────────────────────────────────────────
rss_feeds:

  # ★ Claude Code 官方动态专区
  # 这里专门收录与 Claude Code 直接相关的一手官方信息
  claude_code_official:
    - name: "Claude Code Releases"
      url: "https://github.com/anthropics/claude-code/releases.atom"
      note: "Claude Code CLI 版本发布记录"
    - name: "Anthropic SDK Python"
      url: "https://github.com/anthropics/anthropic-sdk-python/releases.atom"
      note: "Python SDK 版本更新"
    - name: "Anthropic SDK TypeScript"
      url: "https://github.com/anthropics/anthropic-sdk-typescript/releases.atom"
      note: "TypeScript SDK 版本更新"
    - name: "PyPI anthropic"
      url: "https://pypi.org/rss/project/anthropic/releases.xml"
      note: "anthropic PyPI 包发布"
    - name: "PyPI openai"
      url: "https://pypi.org/rss/project/openai/releases.xml"
      note: "openai PyPI 包发布（对照参考）"

  # Anthropic 官方内容（使用社区维护的 RSS，含真实发布时间）
  official:
    - name: "Anthropic News"
      url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml"
    - name: "Anthropic Engineering"
      url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml"
    - name: "Anthropic Research"
      url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_research.xml"
    - name: "OpenAI 官方博客"
      url: "https://openai.com/news/rss.xml"
    - name: "HuggingFace Blog"
      url: "https://huggingface.co/blog/feed.xml"

  # 学术研究（高级读者）
  research:
    - name: "arXiv cs.AI"
      url: "https://rss.arxiv.org/rss/cs.ai"
    - name: "arXiv cs.LG"
      url: "https://rss.arxiv.org/rss/cs.LG"

  # 科技媒体
  tech_news:
    - name: "TechCrunch AI"
      url: "https://techcrunch.com/tag/anthropic/feed/"
    - name: "VentureBeat AI"
      url: "https://venturebeat.com/category/ai/feed/"
    - name: "The Verge AI"
      url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    - name: "Wired AI"
      url: "https://www.wired.com/feed/tag/ai/latest/rss"
    - name: "MIT Technology Review AI"
      url: "https://www.technologyreview.com/topic/artificial-intelligence/feed/"

  # Newsletter（初/中级读者友好）
  newsletter:
    - name: "Ben's Bites"
      url: "https://bensbites.beehiiv.com/feed"
    - name: "Import AI (Jack Clark)"
      url: "https://importai.substack.com/feed"
    - name: "The Batch (deeplearning.ai)"
      url: "https://www.deeplearning.ai/the-batch/feed/"
    - name: "AI News (smol.ai)"
      url: "https://buttondown.com/ainews/rss"

  # 高质量技术博客
  high_quality_blogs:
    - name: "Simon Willison's Weblog"
      url: "https://simonwillison.net/atom/everything/"
    - name: "Interconnects (Nathan Lambert)"
      url: "https://www.interconnects.ai/feed"
    - name: "Latent Space"
      url: "https://www.latent.space/feed"
    - name: "Lilian Weng Blog"
      url: "https://lilianweng.github.io/index.xml"
    - name: "Eugene Yan"
      url: "https://eugeneyan.com/rss.xml"

  # 开发者社区博客
  developer_blogs:
    - name: "dev.to #claudecode"
      url: "https://dev.to/feed/tag/claudecode"
    - name: "dev.to #anthropic"
      url: "https://dev.to/feed/tag/anthropic"

# ────────────────────────────────────────
# 中文源
# ────────────────────────────────────────
chinese_sources:
  rss:
    - name: "少数派 AI"
      url: "https://sspai.com/tag/AI/feed"
    - name: "InfoQ AI"
      url: "https://www.infoq.cn/feed?channel=ai"
    - name: "V2EX Claude (RSS)"
      url: "https://www.v2ex.com/feed/claude.xml"

  crawl:
    - name: "V2EX Claude"
      url: "https://www.v2ex.com/go/claude"
      type: "v2ex"
    - name: "掘金 Claude"
      url: "https://juejin.cn/tag/Claude"
      type: "juejin"

  keywords:
    - "Claude Code"
    - "claude code"
    - "Anthropic"
    - "AI编程助手"
    - "Claude 使用技巧"

# ────────────────────────────────────────
# YouTube
# ────────────────────────────────────────
youtube:
  channels:
    - name: "Anthropic"
      channel_id: "UCln4b2ZqzKLJAfZiMrsgEMw"
    - name: "AI Explained"
      channel_id: "UCNJ1Ymd5yFuUPtn21xtRbbw"
    - name: "Fireship"
      channel_id: "UCsBjURrPoezykLs9EqgamOA"
  keywords:
    - "claude code tutorial"
    - "anthropic claude"
  rss_template: "https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"

# ────────────────────────────────────────
# 内容处理
# ────────────────────────────────────────
processing:
  # 前沿区：多少天内的内容
  frontier_days: 7
  # 最低质量分（0-10）才展示
  min_quality_score: 5.0
  # Claude CLI 处理并发数
  claude_concurrency: 3
  # 每次最多处理条数（控制 CLI 调用次数）
  max_items_per_run: 100
  # 语言：zh=输出中文摘要, en=英文, both=双语
  summary_language: "zh"

# ────────────────────────────────────────
# 网站配置
# ────────────────────────────────────────
site:
  title: "ClaudeNotice"
  description: "Claude Code 最新资讯与最佳实践聚合"
  base_url: "https://BinHPdev.github.io/ClaudeNotice"
  items_per_page: 30
  # 标签分类
  tags:
    - CLAUDE.md
    - workflow
    - 提效技巧
    - 新功能
    - 最佳实践
    - 工具集成
    - 案例分享
    - 模型能力
    - 提示工程
    - SDK更新
    - 研究论文
