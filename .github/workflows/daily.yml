name: Daily Claude Notice Update

on:
  schedule:
    # 每天 1 次自动运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发（GitHub Actions 页面点按钮）

jobs:
  update:
    # 关键：runs-on: self-hosted 表示在你的 Mac 本地执行
    runs-on: self-hosted
    permissions:
      contents: write
      pages: write

    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用 deploy key 以便后面能 push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 虚拟环境
        run: |
          # 复用已有 venv 避免重复下载
          if [ ! -f .venv/bin/activate ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -q --retries 3 --timeout 30 -r requirements.txt

      - name: 运行爬虫 + 处理 + 生成网站
        timeout-minutes: 20
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 防止 Mac 休眠
          caffeinate -s -w $$ &
          source .venv/bin/activate
          python3 main.py all

      - name: 提交并推送更新
        run: |
          git config user.name  "ClaudeNotice Bot"
          git config user.email "bot@claudenotice.local"
          git add docs/ data/processed/ data/seen_ids.json data/pinned.json
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push origin main

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "deploy: $(date -u +%Y-%m-%d)"
