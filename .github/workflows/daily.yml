name: Daily Claude Notice Update

on:
  schedule:
    # 每天 1 次自动运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发（GitHub Actions 页面点按钮）

jobs:
  update:
    # 关键：runs-on: self-hosted 表示在你的 Mac 本地执行
    runs-on: self-hosted
    permissions:
      contents: write
      pages: write

    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用 deploy key 以便后面能 push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 虚拟环境
        # 单独设置 5 分钟硬上限，避免 pip 卡住后吃掉整个 job 的 30 分钟
        timeout-minutes: 5
        run: |
          # 复用已有 venv 避免重复下载
          if [ ! -f .venv/bin/activate ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          # 去掉 -q：可见进度，便于卡住时定位是哪个包
          # 加清华镜像 + PyPI 备选：国内访问 PyPI 偶发超时（5-02 事故）
          pip install \
            --retries 3 --timeout 30 \
            --progress-bar off \
            -i https://pypi.tuna.tsinghua.edu.cn/simple \
            --extra-index-url https://pypi.org/simple \
            -r requirements.txt

      - name: Claude CLI 健康检查
        # 5-28 事故：100 条全部 [Claude CLI] 错误: 但 stderr 为空，根因不明。
        # 在分析前先打印 claude 路径/版本，下次失败能看出是没登录、找不到二进制还是别的。
        continue-on-error: true
        run: |
          which claude || echo "claude not in PATH"
          claude --version || echo "claude --version failed (rc=$?)"

      - name: 运行爬虫 + 处理 + 生成网站
        timeout-minutes: 20
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 防止 Mac 休眠
          caffeinate -s -w $$ &
          source .venv/bin/activate
          python3 main.py all

      - name: 提交并推送更新
        run: |
          git config user.name  "ClaudeNotice Bot"
          git config user.email "bot@claudenotice.local"
          git add docs/ data/processed/ data/seen_ids.json data/pinned.json
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          # 5-28 事故：push 时 GitHub 连不上（75s 超时），整个 job 失败但 commit 已经在 runner 上了。
          # 加 3 次重试，间隔 30s，覆盖瞬时网络抖动；失败时先 pull --rebase 处理 race
          # （远端被人手动 push、或前次 rerun 留下分叉）。
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "push 成功（第 $attempt 次尝试）"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "push 失败，尝试 pull --rebase 后重试（第 $attempt 次）..."
              # 拒绝可能是 non-fast-forward 也可能是网络问题。rebase 失败就放弃这次尝试。
              git pull --rebase origin main || git rebase --abort || true
              sleep 30
            else
              echo "push 重试 3 次仍失败"
              exit 1
            fi
          done

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: docs
          branch: gh-pages
          commit-message: "deploy: $(date -u +%Y-%m-%d)"
